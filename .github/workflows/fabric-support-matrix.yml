name: fabric support matrix

on:
  workflow_dispatch:
  schedule:
    - cron: "43 5 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  supported-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
      - name: Install Minecraft runtime packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2t64 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcairo2 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0 \
            libnss3 \
            libx11-6 \
            libxcomposite1 \
            libxdamage1 \
            libxext6 \
            libxfixes3 \
            libxrandr2 \
            libxtst6 \
            xauth \
            xvfb
      - name: Run supported Fabric matrix probes
        run: mise run packaged-fabric-supported-matrix-probe
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: fabric-support-matrix-reports
          if-no-files-found: warn
          path: |
            build/craftless-packaged-latest-current-probe
            build/craftless-packaged-current-lane-probe
            build/craftless-packaged-representative-older-probe
            driver-fabric/build/craftless-packaged-latest-current-probe
            driver-fabric/build/craftless-packaged-current-lane-probe
            driver-fabric/build/craftless-packaged-representative-older-probe

name: docs-site

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/docs-site.yml"
      - ".mise.toml"
      - "docs-site/**"
      - "protocol/src/main/kotlin/com/minekube/craftless/protocol/**"
      - "protocol/build.gradle.kts"
      - "settings.gradle.kts"
      - "build.gradle.kts"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Check Cloudflare deploy token
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error title=Missing CLOUDFLARE_API_TOKEN::Add a Cloudflare API token with Account Settings Read, Workers Scripts Write, Workers Routes Write, and Zone Read permissions."
            exit 1
          fi
      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
      - name: Verify docs site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: mise run docs-site-verify
      - name: Deploy to Cloudflare Workers
        working-directory: docs-site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: mise exec -- bun run deploy

name: release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CRAFTLESS_VERSION: 0.1.0-SNAPSHOT
  REGISTRY_IMAGE: ghcr.io/minekube/craftless

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Resolve release version
        if: github.ref_type == 'tag'
        run: echo "CRAFTLESS_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Verify
        run: mise run ci

      - name: Package CLI
        run: |
          mise run package-cli
          mkdir -p build/release
          cp cli/build/distributions/craftless-*.zip build/release/
          cp cli/build/distributions/craftless-*.tar build/release/
          (cd build/release && shasum -a 256 * > SHA256SUMS)

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          generate_release_notes: true
          files: |
            build/release/craftless-*.zip
            build/release/craftless-*.tar
            build/release/SHA256SUMS

  build-runtime-image:
    needs: release
    name: build runtime image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Resolve release version
        if: github.ref_type == 'tag'
        run: echo "CRAFTLESS_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Package CLI
        run: mise run package-cli

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        if: github.ref_type == 'tag'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: ${{ github.ref_type == 'tag' }}
          tags: |
            ${{ env.REGISTRY_IMAGE }}:${{ github.ref_name }}-${{ matrix.arch }}

  publish-runtime-image-manifest:
    needs: build-runtime-image
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish runtime image manifest
        run: |
          docker buildx imagetools create \
            --tag "${REGISTRY_IMAGE}:${GITHUB_REF_NAME}" \
            --tag "${REGISTRY_IMAGE}:latest" \
            "${REGISTRY_IMAGE}:${GITHUB_REF_NAME}-amd64" \
            "${REGISTRY_IMAGE}:${GITHUB_REF_NAME}-arm64"

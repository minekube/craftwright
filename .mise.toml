[tools]
java = "temurin-21.0.11+10.0.LTS"
gradle = "9.6.0"
bun = "1.3.14"

[tasks.jvm-test]
description = "Run the Kotlin/JVM test suite"
run = "mise exec -- gradle test"

[tasks.lint]
description = "Run Kotlin formatting and static-analysis checks"
run = "mise exec -- gradle lint"

[tasks.lint-fix]
description = "Auto-format Kotlin sources with ktlint"
run = "mise exec -- gradle lintFormat"

[tasks.unused-check]
description = "Run explicit Kotlin unused and dead-code checks through Detekt"
run = "mise exec -- gradle detekt"

[tasks.playwright-test]
description = "Run the Playwright integration helper tests"
run = "mise exec -- bun test playwright"

[tasks.architecture-check]
description = "Run focused checks for live OpenAPI/action architecture"
run = [
    "mise exec -- gradle :protocol:test",
    "mise exec -- gradle :daemon:test",
    "mise exec -- gradle :cli:test",
    "mise exec -- gradle :driver-fabric:test",
    "mise exec -- bun test playwright",
]

[tasks.package-cli]
description = "Build Craftless CLI release archives and Docker context"
run = [
    "rm -f cli/build/distributions/craftless-*.zip cli/build/distributions/craftless-*.tar",
    "mise exec -- gradle :cli:distZip :cli:distTar :driver-fabric:remapJar",
    "tar -tf cli/build/distributions/craftless-*.tar | grep -q '/mods/craftless-driver-fabric.jar$'",
    "tar -tf cli/build/distributions/craftless-*.tar | grep -q '/driver-mods.json$'",
    "! tar -xOf cli/build/distributions/craftless-*.tar '*/driver-mods.json' | grep -q 'artifactKey'",
    "! tar -xOf cli/build/distributions/craftless-*.tar '*/driver-mods.json' | grep -q 'distributionPath'",
    "jar tf cli/build/distributions/craftless-*.zip | grep -q '/mods/craftless-driver-fabric.jar$'",
    "jar tf cli/build/distributions/craftless-*.zip | grep -q '/driver-mods.json$'",
    "! unzip -p cli/build/distributions/craftless-*.zip '*/driver-mods.json' | grep -q 'artifactKey'",
    "! unzip -p cli/build/distributions/craftless-*.zip '*/driver-mods.json' | grep -q 'distributionPath'",
    "rm -rf build/docker/craftless",
    "mkdir -p build/docker/craftless",
    "tar -xf cli/build/distributions/craftless-*.tar -C build/docker/craftless --strip-components=1",
    "mkdir -p build/docker/craftless/mods",
    "find driver-fabric/build/libs -maxdepth 1 -type f -name 'driver-fabric-*.jar' ! -name '*-sources.jar' ! -name 'driver-fabric-*_*' -exec cp {} build/docker/craftless/mods/craftless-driver-fabric.jar \\; -quit",
    "test -f build/docker/craftless/mods/craftless-driver-fabric.jar",
    "jar tf build/docker/craftless/mods/craftless-driver-fabric.jar | grep -q '^fabric.mod.json$'",
    "jar tf build/docker/craftless/mods/craftless-driver-fabric.jar | grep -q '^META-INF/jars/.\\+\\.jar$'",
    "jar tf build/docker/craftless/mods/craftless-driver-fabric.jar | grep -q '^META-INF/jars/kotlin-stdlib-'",
    "jar tf build/docker/craftless/mods/craftless-driver-fabric.jar | grep -q '^META-INF/jars/kotlinx-coroutines-core-jvm-'",
    "jar tf build/docker/craftless/mods/craftless-driver-fabric.jar | grep -q '^META-INF/jars/ktor-http-jvm-'",
]

[tasks.ci]
description = "Run all repository verification checks"
run = [
    "mise exec -- gradle lint",
    "mise run unused-check",
    "mise exec -- gradle test",
    "mise exec -- bun test playwright",
]

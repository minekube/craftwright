[tools]
java = "temurin-21.0.11+10.0.LTS"
gradle = "9.6.0"
bun = "1.3.14"

[tasks.jvm-test]
description = "Run the Kotlin/JVM test suite"
run = "mise exec -- gradle test"

[tasks.lint]
description = "Run Kotlin formatting and static-analysis checks"
run = "mise exec -- gradle lint"

[tasks.lint-fix]
description = "Auto-format Kotlin sources with ktlint"
run = "mise exec -- gradle lintFormat"

[tasks.unused-check]
description = "Run explicit Kotlin unused and dead-code checks through Detekt"
run = "mise exec -- gradle detekt"

[tasks.playwright-test]
description = "Run the Playwright integration helper tests"
run = "mise exec -- bun test playwright"

[tasks.docs-site-openapi]
description = "Generate the supervisor OpenAPI snapshot consumed by the static docs site"
run = "mise exec -- gradle :protocol:exportSupervisorOpenApi"

[tasks.docs-site-build]
description = "Build the Fumadocs static site for GitHub Pages"
run = [
    "mise run docs-site-openapi",
    "cd docs-site && mise exec -- bun install --frozen-lockfile",
    "cd docs-site && mise exec -- bun run build",
]

[tasks.ci-craftless-smoke]
description = "Run the packaged Craftless CLI daemon and probe the live API"
run = [
    "mise run package-cli",
    "scripts/ci-craftless-smoke.sh",
]

[tasks.architecture-check]
description = "Run focused checks for live OpenAPI/action architecture"
run = [
    "mise exec -- gradle :protocol:test",
    "mise exec -- gradle :daemon:test",
    "mise exec -- gradle :cli:test",
    "mise exec -- gradle :driver-fabric:test",
    "mise exec -- bun test playwright",
]

[tasks.fabric-lane-check-older]
description = "Compile-probe the representative older Fabric driver lane and record source-compatibility blockers"
run = """
mkdir -p build/reports
set +e
mise exec -- gradle :driver-fabric:compileKotlin :driver-fabric:processResources :driver-fabric:writeFabricDriverLaneCatalog \
  -Pcraftless.fabric.minecraftVersion=1.20.6 \
  -Pcraftless.fabric.yarnMappings=1.20.6+build.3 \
  -Pcraftless.fabric.loaderVersion=0.19.3 \
  -Pcraftless.fabric.apiVersion=0.100.8+1.20.6 \
  -Pcraftless.fabric.javaMajorVersion=21 \
  -Pcraftless.fabric.laneId=fabric-1-20-6-lane \
  -Pcraftless.fabric.providerId=fabric-1-20-6-lane \
  -Pcraftless.fabric.artifactKey=fabric-1-20-6-remap-jar \
  -Pcraftless.fabric.mappingsFingerprint=craftless-fabric-bindings-1-20-6 \
  > build/reports/fabric-lane-check-older.log 2>&1
status=$?
set -e
cat build/reports/fabric-lane-check-older.log
if [ "$status" -eq 0 ]; then
  printf 'status=compiled\\n' > build/reports/fabric-lane-check-older.status
  exit 0
fi
grep -Eq "Unresolved reference '(RecipeDisplayEntry|NetworkRecipeId|RecipeFinder|AbstractCraftingScreenHandler|SlotDisplay)'" build/reports/fabric-lane-check-older.log
if grep -q "Unresolved reference 'PlayerInput'" build/reports/fabric-lane-check-older.log; then
  echo "unexpected PlayerInput compile blocker remained after reflective movement input shim" >&2
  exit 1
fi
if grep -q "Unresolved reference 'ClientWorldEvents'" build/reports/fabric-lane-check-older.log; then
  echo "unexpected ClientWorldEvents compile blocker remained after reflective callback registration" >&2
  exit 1
fi
printf 'status=source-compatibility-blocked\\nblockers=RecipeDisplayApi\\n' > build/reports/fabric-lane-check-older.status
cat build/reports/fabric-lane-check-older.status
"""

[tasks.fabric-lane-check-latest-official]
description = "Compile-probe the latest Fabric driver lane through the official Mojang mapping boundary"
run = """
mkdir -p build/reports
set +e
mise exec java@temurin-25.0.3+9.0.LTS gradle@9.6.0 -- gradle :driver-fabric-official:compileKotlin :driver-fabric-official:processResources :driver-fabric-official:jar \
  > build/reports/fabric-lane-check-latest-official.log 2>&1
status=$?
set -e
cat build/reports/fabric-lane-check-latest-official.log
if [ "$status" -eq 0 ]; then
  printf 'status=compiled\\n' > build/reports/fabric-lane-check-latest-official.status
  exit 0
fi
if grep -q "requires Java 25 but Gradle is using" build/reports/fabric-lane-check-latest-official.log; then
  printf 'status=source-compatibility-blocked\\nblockers=java25-gradle-runtime\\n' > build/reports/fabric-lane-check-latest-official.status
  cat build/reports/fabric-lane-check-latest-official.status
  exit 0
fi
if grep -q "Configuration 'mappings' has no dependencies" build/reports/fabric-lane-check-latest-official.log; then
  printf 'status=source-compatibility-blocked\\nblockers=loom-remap-requires-mappings\\n' > build/reports/fabric-lane-check-latest-official.status
  cat build/reports/fabric-lane-check-latest-official.status
  exit 0
fi
printf 'status=source-compatibility-blocked\\nblockers=official-mapping-source-port\\n' > build/reports/fabric-lane-check-latest-official.status
cat build/reports/fabric-lane-check-latest-official.status
"""

[tasks.package-cli]
description = "Build Craftless CLI release archives and Docker context"
run = [
    "rm -f cli/build/distributions/craftless-*.zip cli/build/distributions/craftless-*.tar",
    "rm -rf build/driver-lanes/older",
    "rm -rf build/driver-lanes/latest-official",
    "rm -rf build/driver-lanes/mods",
    "mkdir -p build/driver-lanes/older build/driver-lanes/latest-official",
    "mkdir -p build/driver-lanes/mods/fabric-1.20.6",
    "mkdir -p build/driver-lanes/mods/fabric-1.21.6/runtime",
    "mkdir -p build/driver-lanes/mods/fabric-26.2",
    "mise exec -- gradle :driver-fabric:remapJar :driver-fabric:writeFabricDriverLaneCatalog :driver-fabric:preparePathfinderRuntime -Pcraftless.fabric.minecraftVersion=1.20.6 -Pcraftless.fabric.yarnMappings=1.20.6+build.3 -Pcraftless.fabric.loaderVersion=0.19.3 -Pcraftless.fabric.apiVersion=0.100.8+1.20.6 -Pcraftless.fabric.javaMajorVersion=21 -Pcraftless.fabric.laneId=fabric-1-20-6-lane -Pcraftless.fabric.providerId=fabric-1-20-6-lane -Pcraftless.fabric.artifactKey=fabric-1-20-6-remap-jar -Pcraftless.fabric.mappingsFingerprint=craftless-fabric-bindings-1-20-6 -Pcraftless.fabric.distributionPath=mods/fabric-1.20.6/craftless-driver-fabric.jar",
    "find driver-fabric/build/libs -maxdepth 1 -type f -name 'driver-fabric-*.jar' ! -name '*-sources.jar' ! -name 'driver-fabric-*_*' -exec cp {} build/driver-lanes/mods/fabric-1.20.6/craftless-driver-fabric.jar \\; -quit",
    "cp driver-fabric/build/pathfinder/baritone-api-fabric-1.15.0.jar build/driver-lanes/mods/fabric-1.21.6/runtime/baritone-api-fabric-1.15.0.jar",
    "cp driver-fabric/build/pathfinder/nether-pathfinder-1.4.1.jar build/driver-lanes/mods/fabric-1.21.6/runtime/nether-pathfinder-1.4.1.jar",
    "printf '%s\n' '{' '  \"entries\": [' '    {' '      \"loader\": \"FABRIC\",' '      \"minecraftVersion\": \"1.20.6\",' '      \"loaderVersion\": \"0.19.3\",' '      \"path\": \"mods/fabric-1.20.6/craftless-driver-fabric.jar\",' '      \"providerId\": \"fabric-1-20-6-lane\",' '      \"artifactKey\": \"fabric-1-20-6-remap-jar\",' '      \"fabricApiVersion\": \"0.100.8+1.20.6\",' '      \"javaMajorVersion\": 21,' '      \"mappingsFingerprint\": \"craftless-fabric-bindings-1-20-6\",' '      \"distributionPath\": \"mods/fabric-1.20.6/craftless-driver-fabric.jar\"' '    }' '  ]' '}' > build/driver-lanes/older/fabric-driver-lanes.json",
    "test -f build/driver-lanes/mods/fabric-1.20.6/craftless-driver-fabric.jar",
    "test -f build/driver-lanes/mods/fabric-1.21.6/runtime/baritone-api-fabric-1.15.0.jar",
    "test -f build/driver-lanes/mods/fabric-1.21.6/runtime/nether-pathfinder-1.4.1.jar",
    "grep -q '\"minecraftVersion\": \"1.20.6\"' build/driver-lanes/older/fabric-driver-lanes.json",
    "mise exec java@temurin-25.0.3+9.0.LTS gradle@9.6.0 -- gradle :driver-fabric-official:jar",
    "find driver-fabric-official/build/libs -maxdepth 1 -type f -name 'driver-fabric-official-*.jar' ! -name '*-sources.jar' -exec cp {} build/driver-lanes/mods/fabric-26.2/craftless-driver-fabric-official.jar \\; -quit",
    "test -f build/driver-lanes/mods/fabric-26.2/craftless-driver-fabric-official.jar",
    "printf '%s\n' '{' '  \"entries\": [' '    {' '      \"loader\": \"FABRIC\",' '      \"minecraftVersion\": \"26.2\",' '      \"loaderVersion\": \"0.19.3\",' '      \"path\": \"mods/fabric-26.2/craftless-driver-fabric-official.jar\",' '      \"providerId\": \"fabric-26-2-official-lane\",' '      \"artifactKey\": \"fabric-26-2-official-jar\",' '      \"fabricApiVersion\": \"0.153.0+26.2\",' '      \"javaMajorVersion\": 25,' '      \"mappingsFingerprint\": \"craftless-fabric-official-26-2\",' '      \"distributionPath\": \"mods/fabric-26.2/craftless-driver-fabric-official.jar\"' '    }' '  ]' '}' > build/driver-lanes/latest-official/fabric-driver-lanes.json",
    "grep -q '\"minecraftVersion\": \"26.2\"' build/driver-lanes/latest-official/fabric-driver-lanes.json",
    "grep -q '\"fabricApiVersion\": \"0.153.0+26.2\"' build/driver-lanes/latest-official/fabric-driver-lanes.json",
    "grep -q '\"javaMajorVersion\": 25' build/driver-lanes/latest-official/fabric-driver-lanes.json",
    "mise exec -- gradle :cli:distZip :cli:distTar :driver-fabric:remapJar -Pcraftless.extraFabricDriverLaneRoot=build/driver-lanes -Pcraftless.fabric.runtimeMods=mods/fabric-1.21.6/runtime/baritone-api-fabric-1.15.0.jar,mods/fabric-1.21.6/runtime/nether-pathfinder-1.4.1.jar",
    "tar -tf cli/build/distributions/craftless-*.tar | grep -q '/mods/craftless-driver-fabric.jar$'",
    "tar -tf cli/build/distributions/craftless-*.tar | grep -q '/mods/fabric-1.20.6/craftless-driver-fabric.jar$'",
    "tar -tf cli/build/distributions/craftless-*.tar | grep -q '/mods/fabric-1.21.6/runtime/baritone-api-fabric-1.15.0.jar$'",
    "tar -tf cli/build/distributions/craftless-*.tar | grep -q '/mods/fabric-1.21.6/runtime/nether-pathfinder-1.4.1.jar$'",
    "tar -tf cli/build/distributions/craftless-*.tar | grep -q '/mods/fabric-26.2/craftless-driver-fabric-official.jar$'",
    "tar -tf cli/build/distributions/craftless-*.tar | grep -q '/driver-mods.json$'",
    "tar_driver_mods_entry=\"$(tar -tf cli/build/distributions/craftless-*.tar | grep '/driver-mods.json$' | head -n 1)\"; tar -xOf cli/build/distributions/craftless-*.tar \"$tar_driver_mods_entry\" > build/driver-mods-from-tar.json",
    "grep -q 'fabricApiVersion' build/driver-mods-from-tar.json",
    "grep -q 'javaMajorVersion' build/driver-mods-from-tar.json",
    "grep -q 'mappingsFingerprint' build/driver-mods-from-tar.json",
    "grep -q '\"minecraftVersion\": \"1.20.6\"' build/driver-mods-from-tar.json",
    "grep -q '\"minecraftVersion\": \"26.2\"' build/driver-mods-from-tar.json",
    "grep -q '\"javaMajorVersion\": 25' build/driver-mods-from-tar.json",
    "grep -q 'craftless-fabric-official-26-2' build/driver-mods-from-tar.json",
    "grep -q 'mods/fabric-1.20.6/craftless-driver-fabric.jar' build/driver-mods-from-tar.json",
    "grep -q 'runtimeMods' build/driver-mods-from-tar.json",
    "grep -q 'mods/fabric-1.21.6/runtime/baritone-api-fabric-1.15.0.jar' build/driver-mods-from-tar.json",
    "grep -q 'mods/fabric-26.2/craftless-driver-fabric-official.jar' build/driver-mods-from-tar.json",
    "! grep -q 'artifactKey' build/driver-mods-from-tar.json",
    "! grep -q 'distributionPath' build/driver-mods-from-tar.json",
    "jar tf cli/build/distributions/craftless-*.zip | grep -q '/mods/craftless-driver-fabric.jar$'",
    "jar tf cli/build/distributions/craftless-*.zip | grep -q '/mods/fabric-1.20.6/craftless-driver-fabric.jar$'",
    "jar tf cli/build/distributions/craftless-*.zip | grep -q '/mods/fabric-1.21.6/runtime/baritone-api-fabric-1.15.0.jar$'",
    "jar tf cli/build/distributions/craftless-*.zip | grep -q '/mods/fabric-1.21.6/runtime/nether-pathfinder-1.4.1.jar$'",
    "jar tf cli/build/distributions/craftless-*.zip | grep -q '/mods/fabric-26.2/craftless-driver-fabric-official.jar$'",
    "jar tf cli/build/distributions/craftless-*.zip | grep -q '/driver-mods.json$'",
    "unzip -p cli/build/distributions/craftless-*.zip '*/driver-mods.json' | grep -q 'fabricApiVersion'",
    "unzip -p cli/build/distributions/craftless-*.zip '*/driver-mods.json' | grep -q 'javaMajorVersion'",
    "unzip -p cli/build/distributions/craftless-*.zip '*/driver-mods.json' | grep -q 'mappingsFingerprint'",
    "unzip -p cli/build/distributions/craftless-*.zip '*/driver-mods.json' | grep -q '\"minecraftVersion\": \"1.20.6\"'",
    "unzip -p cli/build/distributions/craftless-*.zip '*/driver-mods.json' | grep -q '\"minecraftVersion\": \"26.2\"'",
    "unzip -p cli/build/distributions/craftless-*.zip '*/driver-mods.json' | grep -q '\"javaMajorVersion\": 25'",
    "unzip -p cli/build/distributions/craftless-*.zip '*/driver-mods.json' | grep -q 'craftless-fabric-official-26-2'",
    "unzip -p cli/build/distributions/craftless-*.zip '*/driver-mods.json' | grep -q 'mods/fabric-1.20.6/craftless-driver-fabric.jar'",
    "unzip -p cli/build/distributions/craftless-*.zip '*/driver-mods.json' | grep -q 'runtimeMods'",
    "unzip -p cli/build/distributions/craftless-*.zip '*/driver-mods.json' | grep -q 'mods/fabric-1.21.6/runtime/baritone-api-fabric-1.15.0.jar'",
    "unzip -p cli/build/distributions/craftless-*.zip '*/driver-mods.json' | grep -q 'mods/fabric-26.2/craftless-driver-fabric-official.jar'",
    "! unzip -p cli/build/distributions/craftless-*.zip '*/driver-mods.json' | grep -q 'artifactKey'",
    "! unzip -p cli/build/distributions/craftless-*.zip '*/driver-mods.json' | grep -q 'distributionPath'",
    "rm -rf build/docker/craftless",
    "mkdir -p build/docker/craftless",
    "tar -xf cli/build/distributions/craftless-*.tar -C build/docker/craftless --strip-components=1",
    "mkdir -p build/docker/craftless/mods",
    "find driver-fabric/build/libs -maxdepth 1 -type f -name 'driver-fabric-*.jar' ! -name '*-sources.jar' ! -name 'driver-fabric-*_*' -exec cp {} build/docker/craftless/mods/craftless-driver-fabric.jar \\; -quit",
    "test -f build/docker/craftless/mods/craftless-driver-fabric.jar",
    "test -f build/docker/craftless/mods/fabric-1.20.6/craftless-driver-fabric.jar",
    "test -f build/docker/craftless/mods/fabric-1.21.6/runtime/baritone-api-fabric-1.15.0.jar",
    "test -f build/docker/craftless/mods/fabric-1.21.6/runtime/nether-pathfinder-1.4.1.jar",
    "test -f build/docker/craftless/mods/fabric-26.2/craftless-driver-fabric-official.jar",
    "jar tf build/docker/craftless/mods/craftless-driver-fabric.jar | grep -q '^fabric.mod.json$'",
    "jar tf build/docker/craftless/mods/fabric-26.2/craftless-driver-fabric-official.jar | grep -q '^fabric.mod.json$'",
    "jar tf build/docker/craftless/mods/craftless-driver-fabric.jar | grep -q '^META-INF/jars/.\\+\\.jar$'",
    "jar tf build/docker/craftless/mods/fabric-26.2/craftless-driver-fabric-official.jar | grep -q '^META-INF/jars/.\\+\\.jar$'",
    "jar tf build/docker/craftless/mods/craftless-driver-fabric.jar | grep -q '^META-INF/jars/kotlin-stdlib-'",
    "jar tf build/docker/craftless/mods/fabric-26.2/craftless-driver-fabric-official.jar | grep -q '^META-INF/jars/kotlin-stdlib-'",
    "jar tf build/docker/craftless/mods/craftless-driver-fabric.jar | grep -q '^META-INF/jars/kotlinx-coroutines-core-jvm-'",
    "jar tf build/docker/craftless/mods/craftless-driver-fabric.jar | grep -q '^META-INF/jars/ktor-http-jvm-'",
    "jar tf build/docker/craftless/mods/fabric-26.2/craftless-driver-fabric-official.jar | grep -q '^META-INF/jars/ktor-http-jvm-'",
]

[tasks.packaged-latest-current-probe]
description = "Run packaged latest-release create/attach/connect artifact probe"
run = [
    "mise run package-cli",
    "CRAFTLESS_LOCAL_SERVER_SMOKE=1 CRAFTLESS_LOCAL_SERVER_SMOKE_ROOT=build/craftless-packaged-latest-current-probe CRAFTLESS_SMOKE_MINECRAFT_VERSION=latest-release CRAFTLESS_SMOKE_JAVA_EXECUTABLE=$HOME/.local/share/mise/installs/java/temurin-25.0.3+9.0.LTS/bin/java CRAFTLESS_SMOKE_ACTION_TIMEOUT_MS=900000 CRAFTLESS_PACKAGED_LATEST_TIMEOUT_MS=900000 CRAFTLESS_SMOKE_ACTION_COMMAND_JSON=\"[\\\"$PWD/scripts/packaged-latest-current-probe.sh\\\"]\" mise exec -- gradle :driver-fabric:fabricClientSmoke",
]

[tasks.packaged-representative-older-probe]
description = "Run packaged representative older create/attach/connect artifact probe"
run = [
    "mise run package-cli",
    "CRAFTLESS_LOCAL_SERVER_SMOKE=1 CRAFTLESS_LOCAL_SERVER_SMOKE_ROOT=build/craftless-packaged-representative-older-probe CRAFTLESS_SMOKE_MINECRAFT_VERSION=1.20.6 CRAFTLESS_SMOKE_ACTION_TIMEOUT_MS=900000 CRAFTLESS_PACKAGED_OLDER_TIMEOUT_MS=900000 CRAFTLESS_SMOKE_ACTION_COMMAND_JSON=\"[\\\"$PWD/scripts/packaged-representative-older-probe.sh\\\"]\" mise exec -- gradle :driver-fabric:fabricClientSmoke",
]

[tasks.final-public-gameplay-probe]
description = "Run final honest public gameplay through generated Craftless API/CLI only"
run = [
    "mise run package-cli",
    "rm -rf driver-fabric/build/craftless-final-gameplay",
    "CRAFTLESS_DISABLE_SMOKE_PROVISIONING=1 CRAFTLESS_LOCAL_SERVER_SMOKE=1 CRAFTLESS_LOCAL_SERVER_SMOKE_ROOT=build/craftless-final-gameplay CRAFTLESS_SMOKE_MINECRAFT_VERSION=1.21.6 CRAFTLESS_SMOKE_EXPECT_PLAYER=FinalPublic CRAFTLESS_SMOKE_EXPECT_CHAT_MESSAGE=\"Craftless CL-07 public gameplay probe\" CRAFTLESS_SMOKE_EXPECT_DISCONNECT=1 CRAFTLESS_FABRIC_SMOKE_REQUIRE_EQUIP_ITEM=0 CRAFTLESS_SMOKE_ACTION_TIMEOUT_MS=900000 CRAFTLESS_FINAL_GAMEPLAY_TIMEOUT_MS=900000 CRAFTLESS_SMOKE_ACTION_COMMAND_JSON=\"[\\\"$PWD/scripts/final-public-gameplay-probe.sh\\\"]\" mise exec -- gradle :driver-fabric:fabricClientSmoke",
]

[tasks.ci]
description = "Run all repository verification checks"
run = [
    "mise exec -- gradle lint",
    "mise run unused-check",
    "mise exec -- gradle test",
    "mise run ci-craftless-smoke",
    "mise exec -- bun test playwright",
]
